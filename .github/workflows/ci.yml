name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    # DIAGNOSTIC (temporary): postgres service container removed to isolate
    # whether the repo-wide 3s/zero-step job-startup failures come from the
    # service container (Docker Hub) or the account (Actions spending limit).
    # Unit tests are DB-free; integration tests skip without Postgres.
    env:
      DATABASE_URL: postgresql://lms:lms@localhost:5432/lms_test
      DIRECT_URL: postgresql://lms:lms@localhost:5432/lms_test
      JWT_SECRET: ci-test-secret-key-please-rotate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate SQL schema (pglast)
        run: |
          python -m pip install --quiet pglast
          python - <<'PY'
          import pglast
          for path in ("database/schema.sql", "database/policies/rls.sql"):
              with open(path, encoding="utf-8") as fh:
                  pglast.parse_sql(fh.read())
              print(f"OK  {path}")
          PY

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply schema (raw SQL + RLS)
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/schema.sql
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/policies/rls.sql

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
