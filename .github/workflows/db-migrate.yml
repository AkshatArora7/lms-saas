name: Database Migrate

# Applies the canonical database to the control-plane / pool database, then
# verifies tenant isolation. `database/schema.sql` is the SOURCE OF TRUTH and is
# fully idempotent (every CREATE is `IF NOT EXISTS`), so it is applied directly
# (NOT via Prisma — `packages/db/prisma` has no migrations/ and only models the
# stable core). Prisma is used for client generation only.
#
# Apply order (each with `psql -v ON_ERROR_STOP=1`, fail-fast):
#   1. database/schema.sql          — tables, extensions (vector/pgcrypto/...), funcs
#   2. database/policies/rls.sql    — ENABLE + FORCE RLS + tenant_isolation policies
#   3. database/roles.sql           — least-privilege NOSUPERUSER NOBYPASSRLS app_user
#
# Then two safety gates run against a CLEAN pgvector container (also runnable
# locally): a schema-drift check vs schema.sql and a LIVE RLS verification.
#
# Manual trigger or on push to main when DB artifacts change.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging
  push:
    branches: [main]
    paths:
      - "packages/db/prisma/**"
      - "database/**"
      - "scripts/db/**"
      - ".github/workflows/db-migrate.yml"

concurrency:
  group: db-migrate-${{ github.event.inputs.target || 'production' }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply canonical schema + RLS + roles
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'production' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma is for client generation only — schema.sql is canonical and there
      # are no Prisma migrations to deploy.
      - name: Generate Prisma client
        run: pnpm db:generate

      # Apply the canonical schema idempotently, fail-fast on any error. Order
      # matters: schema -> RLS policies -> least-privilege runtime role.
      - name: Apply canonical schema (schema.sql)
        run: psql -v ON_ERROR_STOP=1 "$DIRECT_URL" -f database/schema.sql

      - name: Apply RLS policies (rls.sql)
        run: psql -v ON_ERROR_STOP=1 "$DIRECT_URL" -f database/policies/rls.sql

      - name: Apply runtime role (roles.sql)
        run: psql -v ON_ERROR_STOP=1 "$DIRECT_URL" -f database/roles.sql

  verify:
    name: Schema drift + live RLS verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms
          POSTGRES_DB: lms
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lms"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PGURL_BASE: postgresql://lms:lms@localhost:5432
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # CANONICAL = a fresh DB with only database/schema.sql (the source of truth).
      - name: Build canonical database (schema.sql only)
        run: |
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms" -c "CREATE DATABASE lms_canonical;"
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms_canonical" -f database/schema.sql

      # TARGET = the migrated DB (schema + RLS + roles), exactly as the migrate
      # job applies it. Drift here means schema.sql was not applied / drifted.
      - name: Build target database (schema + rls + roles, as migrated)
        run: |
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms" -c "CREATE DATABASE lms_target;"
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms_target" -f database/schema.sql
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms_target" -f database/policies/rls.sql
          psql -v ON_ERROR_STOP=1 "$PGURL_BASE/lms_target" -f database/roles.sql

      # AC2 — fail if TARGET drifts from CANONICAL (schema.sql).
      - name: Schema drift check (AC2)
        env:
          FROM_URL: postgresql://lms:lms@localhost:5432/lms_canonical
          TO_URL: postgresql://lms:lms@localhost:5432/lms_target
        run: pnpm db:check-drift

      # AC3 — prove RLS is applied & enforced on the migrated DB.
      - name: Verify RLS policies (AC3)
        env:
          DATABASE_URL: postgresql://lms:lms@localhost:5432/lms_target
        run: pnpm db:verify-rls
