name: Deploy Services

# Builds and publishes container images for changed microservices to the
# GitHub Container Registry (ghcr.io). A downstream environment (Fly.io,
# Render, Railway, or a Vercel-adjacent container host) pulls these images.
# Only services with changes are built (path-filtered matrix).

on:
  push:
    branches: [main]
    paths: ["services/**", "packages/**", ".github/workflows/deploy-services.yml"]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway: services/gateway/**
            identity: services/identity/**
            tenant: services/tenant/**
            course: services/course/**
            content: services/content/**
            enrollment: services/enrollment/**
            assessment: services/assessment/**
            grading: services/grading/**
            discussion: services/discussion/**
            notification: services/notification/**
            analytics: services/analytics/**
            integration: services/integration/**

  build-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR/Docker image references must be all lowercase, but
      # github.repository preserves the owner's original casing
      # (e.g. AkshatArora7/lms-saas). Lowercase it before tagging.
      - name: Compute lowercase image base
        id: image
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.repo }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.image.outputs.repo }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
