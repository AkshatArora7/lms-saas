# -----------------------------------------------------------------------------
# Build-from-source OVERRIDE for the LMS mesh.
#
# The canonical docker-compose.yml defaults to owner-built GHCR images
# (ghcr.io/akshatarora7/lms-saas/<name>:latest). Those images are private to the
# repo owner, so a collaborator who clones the repo and CANNOT pull them — or who
# simply wants to run the CURRENT source — uses this override to build every
# buildable service locally instead. ZERO external accounts are required: no
# Supabase, no GHCR access, no Upstash (the bundled in-compose Postgres + Redis
# are used by default; leave the DB URLs empty in .env).
#
# This file only adds a `build:` block per service. Compose DEEP-MERGES it onto
# the base file, so every service keeps its base environment / ports / depends_on
# / healthcheck and its existing `image:` tag (the locally built image is tagged
# with that same name for consistency).
#
# Bring the WHOLE platform up, built from local source, in one command:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# (npm script shortcut: `pnpm start:build`.)
#
# The default pull path stays unchanged:  docker compose up -d   (`pnpm start`).
# -----------------------------------------------------------------------------
name: lms

services:
  # One-shot demo seeder (already builds in the base file; kept here for parity).
  seed:
    build:
      context: .
      dockerfile: packages/db/seed.Dockerfile

