# ─────────────────────────────────────────────────────────────────────────────
# Full local production-like mesh: Postgres + Redis + every microservice as its
# own container, all on one network, with the gateway wired to each upstream.
#
# Single command to bring the whole platform up (build images on first run):
#
#   docker compose -f docker-compose.services.yml up --build -d
#
# Public edge:   http://localhost:4000  (gateway — authenticated /api/:service/*)
# Every service is also published on its own 40xx port for direct inspection.
# Tear down (and wipe the seeded DB volume):
#   docker compose -f docker-compose.services.yml down -v
#
# NOTE: JWT_SECRET below is a dev-only placeholder. Override every secret via a
# .env file or your orchestrator's secret store before any real deployment.
# ─────────────────────────────────────────────────────────────────────────────
name: lms

x-common-env: &common-env
  NODE_ENV: production
  TENANT_MODE: hybrid
  DEFAULT_TENANT_TIER: pool
  DATABASE_URL: postgresql://lms:lms@postgres:5432/lms
  JWT_SECRET: local-compose-dev-secret-change-me-please
  JWT_ISSUER: https://auth.lms.local
  JWT_AUDIENCE: lms-api
  GROQ_API_KEY: ${GROQ_API_KEY:-}

x-svc-healthcheck: &svc-healthcheck
  test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+(process.env.PORT||'4000')+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
  interval: 10s
  timeout: 5s
  retries: 15
  start_period: 40s

x-depends-db: &depends-db
  postgres:
    condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lms-postgres
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/policies/rls.sql:/docker-entrypoint-initdb.d/02-rls.sql:ro
      - lms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: lms-gateway:local
    environment:
      <<: *common-env
      PORT: 4000
      SERVICE_URL_IDENTITY: http://identity:4001
      SERVICE_URL_TENANT: http://tenant:4002
      SERVICE_URL_USER_ORG: http://user-org:4003
      SERVICE_URL_ENROLLMENT: http://enrollment:4004
      SERVICE_URL_COURSE: http://course:4005
      SERVICE_URL_CONTENT: http://content:4006
      SERVICE_URL_ASSIGNMENT: http://assignment:4007
      SERVICE_URL_ASSESSMENT: http://assessment:4008
      SERVICE_URL_GRADING: http://grading:4009
      SERVICE_URL_DISCUSSION: http://discussion:4010
      SERVICE_URL_ANNOUNCEMENT: http://announcement:4011
      SERVICE_URL_NOTIFICATION: http://notification:4012
      SERVICE_URL_CALENDAR: http://calendar:4013
      SERVICE_URL_RUBRIC: http://rubric:4014
      SERVICE_URL_ANALYTICS: http://analytics:4015
      SERVICE_URL_REPORTING: http://reporting:4016
      SERVICE_URL_AI: http://ai:4017
      SERVICE_URL_LTI: http://lti:4018
      SERVICE_URL_SIS: http://sis:4019
      SERVICE_URL_VIDEO: http://video:4020
      SERVICE_URL_SEARCH: http://search:4021
      SERVICE_URL_BILLING: http://billing:4022
      SERVICE_URL_AUDIT: http://audit:4023
      SERVICE_URL_MOBILE_BFF: http://mobile-bff:4024
      SERVICE_URL_ATTENDANCE: http://attendance:4025
    depends_on:
      <<: *depends-db
    healthcheck: *svc-healthcheck
    ports:
      - "4000:4000"
    restart: unless-stopped

  identity:
    build:
      context: .
      dockerfile: services/identity/Dockerfile
    image: lms-identity:local
    environment:
      <<: *common-env
      PORT: 4001
    depends_on:
      <<: *depends-db
    healthcheck: *svc-healthcheck
