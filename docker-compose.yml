    #   dockerfile: services/identity/Dockerfile
    image: ghcr.io/akshatarora7/lms-saas/identity:latest
    environment:
      <<: *common-env
      PORT: 4001
      OTEL_SERVICE_NAME: identity
      # DB-backed sign-in: with the demo seed applied (see the `seed` service),
      # login flows through the RLS-scoped Prisma store — app_user +
      # user_credential, roles via role_assignment→role→role_permission. The
      # bundled demo accounts (admin@demo.school / student@demo.school,
      # password123) are real rows under the demo tenant.
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck: *svc-healthcheck
    ports:
      - "4001:4001"
    restart: unless-stopped

