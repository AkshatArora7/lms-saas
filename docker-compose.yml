# -----------------------------------------------------------------------------
# Full LMS app mesh in ONE command. This is the canonical compose file: a bare
# `docker compose up -d` brings up the ENTIRE platform - Postgres + Redis + all
# 26 microservices + the gateway + the web app (3000) + the admin app (3001),
# all on one network and wired together by DNS service names.
#
# DATABASE (default): the bundled in-compose Postgres (auto-applies
# database/schema.sql + database/policies/rls.sql on first boot, so tenant RLS
# is enforced out of the box). Nothing external is required.
#
# DATABASE (Supabase, opt-in): set DATABASE_URL in .env (Compose reads .env
# automatically for ${VAR} interpolation) to a Supabase connection string and
# it transparently overrides the in-compose Postgres. For IPv4 / serverless
# runtimes use the Supabase pooler (Supavisor) URL - the direct
# db.<ref>.supabase.co host is IPv6-only.
#
# Images: services + gateway + web + admin default to owner-built GHCR images
# (ghcr.io/akshatarora7/lms-saas/<name>:latest). To build locally instead,
# uncomment the `build:` block kept commented above each `image:` line.
#
# Bring the whole platform up (pulls images on first run):
#
#   docker compose up -d
#
# Public surfaces:
#   http://localhost:3000  web app (learner)
#   http://localhost:3001  admin console
#   http://localhost:4000  gateway (authenticated /api/:service/*)
# Every service is also published on its own 40xx port for direct inspection.
#
# Tear down:  docker compose down   (add -v to also wipe the Postgres volume)
#
# Infra-only stack (Postgres + Redis, used by the integration-test workflow)
# lives in docker-compose.infra.yml: `docker compose -f docker-compose.infra.yml up -d`.
#
# NOTE: the JWT_SECRET fallback below is a dev-only placeholder. Set real secrets
# in .env or your orchestrator's secret store before any real deployment.
# -----------------------------------------------------------------------------
name: lms

x-common-env: &common-env
  NODE_ENV: production
  TENANT_MODE: ${TENANT_MODE:-hybrid}
  DEFAULT_TENANT_TIER: ${DEFAULT_TENANT_TIER:-pool}
  # Three-role DB model (#286 / #290 / #291, ADR-0026): RUNTIME per-request
  # services connect as the least-privilege `app_user` (NOSUPERUSER NOBYPASSRLS,
  # non-owner) via DATABASE_URL so Postgres FORCE RLS is enforced — and app_user
  # is SELECT-only on the five control-plane tables. CONTROL-PLANE writes (tenant
  # provisioning, admin delegation, silo saga + the in-tx event_outbox row) flow
  # through the dedicated `control_plane_user` role via CONTROL_PLANE_DATABASE_URL
  # (also NOSUPERUSER NOBYPASSRLS, so its outbox INSERT stays RLS-subject). The
  # privileged owner/migrator role `lms` is used ONLY by initdb (schema+rls+roles)
  # and the one-shot `seed` service (which overrides DATABASE_URL below). Override
  # any of these in .env (e.g. a Supabase pooler URL for IPv4, pointed at the
  # matching least-priv role) to point the whole mesh at Supabase.
  DATABASE_URL: ${DATABASE_URL:-postgresql://app_user:app_user@postgres:5432/lms}
  DIRECT_URL: ${DIRECT_URL:-postgresql://app_user:app_user@postgres:5432/lms}
  CONTROL_PLANE_DATABASE_URL: ${CONTROL_PLANE_DATABASE_URL:-postgresql://control_plane_user:control_plane_user@postgres:5432/lms}
  JWT_SECRET: ${JWT_SECRET:-local-compose-dev-secret-change-me-please}
  JWT_ISSUER: ${JWT_ISSUER:-https://auth.lms.local}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-lms-api}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  # Distributed tracing (#83): preload the OTel SDK into every service. No-op
  # unless OTEL_ENABLED=true AND an OTLP endpoint is set (see @lms/observability).
  # Empty-string defaults for the optional URL/headers are read raw by the
  # preload and treated as "unset" — they never reach @lms/config's URL zod.
  NODE_OPTIONS: ${NODE_OPTIONS:---require @lms/observability/register}
  OTEL_ENABLED: ${OTEL_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}

x-svc-healthcheck: &svc-healthcheck
  test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+(process.env.PORT||'4000')+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
  interval: 10s
  timeout: 5s
  retries: 15
  start_period: 40s

services:
  # In-compose Postgres (always up). The default DB for the mesh; set DATABASE_URL
  # in .env to point at Supabase instead. Auto-applies the canonical schema + RLS
  # on first boot.
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lms-postgres
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: lms
    ports:
      # Publish via a variable so a collaborator who already runs a local Postgres
      # on 5432 can override the host port (e.g. PG_PORT=5433) and still `up`.
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/policies/rls.sql:/docker-entrypoint-initdb.d/02-rls.sql:ro
      # Runtime least-privilege role (#286 / ADR-0026). Runs AFTER schema + rls as
      # the owner `lms`. Services switch DATABASE_URL to app_user (service-builder).
      - ./database/roles.sql:/docker-entrypoint-initdb.d/03-roles.sql:ro
      - lms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # In-compose Redis (always up). Services use Upstash REST in production; this is
  # parity only and unused unless you wire it up.
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot demo seeder (issue #266). Builds the workspace and runs the
  # dedicated idempotent demo seed (packages/db/prisma/seed.demo.ts) against the
  # in-compose Postgres: it creates the demo tenant (11111111-…-111111111111),
  # the two demo accounts, and a full demo dataset (course, enrollment, grades,
  # discussions, attendance, timetable …). Runs once and exits; identity/web/admin
  # wait on it via `service_completed_successfully` so login can't be hit before
  # the accounts exist. Re-running is safe (ON CONFLICT upserts by fixed uuids).
  seed:
    build:
      context: .
      dockerfile: packages/db/seed.Dockerfile
    image: ghcr.io/akshatarora7/lms-saas/seed:latest
    environment:
      <<: *common-env
      # Seed writes the control-plane tenant row + demo dataset, so it MUST use
      # the privileged owner/migrator role `lms` (not the runtime app_user, which
      # is RLS-enforced and non-owner). Overrides the inherited app_user URL.
      DATABASE_URL: ${MIGRATION_DATABASE_URL:-postgresql://lms:lms@postgres:5432/lms}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    # Local-build fallback (uncomment to build instead of pulling GHCR):
    # build:
    #   context: .
    #   dockerfile: services/gateway/Dockerfile
    image: ghcr.io/akshatarora7/lms-saas/gateway:latest
    environment:
      <<: *common-env
      PORT: 4000
      OTEL_SERVICE_NAME: gateway
      SERVICE_URL_IDENTITY: http://identity:4001
      SERVICE_URL_TENANT: http://tenant:4002
      SERVICE_URL_USER_ORG: http://user-org:4003
      SERVICE_URL_ENROLLMENT: http://enrollment:4004
      SERVICE_URL_COURSE: http://course:4005
      SERVICE_URL_CONTENT: http://content:4006
      SERVICE_URL_ASSIGNMENT: http://assignment:4007
      SERVICE_URL_ASSESSMENT: http://assessment:4008
      SERVICE_URL_GRADING: http://grading:4009
      SERVICE_URL_DISCUSSION: http://discussion:4010
      SERVICE_URL_ANNOUNCEMENT: http://announcement:4011
      SERVICE_URL_NOTIFICATION: http://notification:4012
      SERVICE_URL_CALENDAR: http://calendar:4013
      SERVICE_URL_RUBRIC: http://rubric:4014
      SERVICE_URL_ANALYTICS: http://analytics:4015
      SERVICE_URL_REPORTING: http://reporting:4016
      SERVICE_URL_AI: http://ai:4017
      SERVICE_URL_LTI: http://lti:4018
      SERVICE_URL_SIS: http://sis:4019
      SERVICE_URL_VIDEO: http://video:4020
      SERVICE_URL_SEARCH: http://search:4021
      SERVICE_URL_BILLING: http://billing:4022
      SERVICE_URL_AUDIT: http://audit:4023
      SERVICE_URL_MOBILE_BFF: http://mobile-bff:4024
      SERVICE_URL_ATTENDANCE: http://attendance:4025
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *svc-healthcheck
    ports:
      - "4000:4000"
    restart: unless-stopped

  identity:
    # Local-build fallback (uncomment to build instead of pulling GHCR):
