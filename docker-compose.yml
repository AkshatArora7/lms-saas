      PORT: 3000
      HOSTNAME: "0.0.0.0"
      IDENTITY_URL: http://identity:4001
      USER_ORG_SERVICE_URL: http://user-org:4003
      ENROLLMENT_SERVICE_URL: http://enrollment:4004
      COURSE_SERVICE_URL: http://course:4005
      CONTENT_SERVICE_URL: http://content:4006
      TENANT_SERVICE_URL: http://tenant:4002
      ASSIGNMENT_SERVICE_URL: http://assignment:4007
      GRADING_SERVICE_URL: http://grading:4009
      DISCUSSION_SERVICE_URL: http://discussion:4010
      ANNOUNCEMENT_SERVICE_URL: http://announcement:4011
      CALENDAR_SERVICE_URL: http://calendar:4013
      ATTENDANCE_SERVICE_URL: http://attendance:4025
      ANALYTICS_SERVICE_URL: http://analytics:4015
    depends_on:
