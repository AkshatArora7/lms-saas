        condition: service_healthy
      grading:
        condition: service_healthy
      discussion:
        condition: service_healthy
      announcement:
        condition: service_healthy
      calendar:
        condition: service_healthy
      attendance:
        condition: service_healthy
      analytics:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:'+(process.env.PORT||'3000')+'/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15
