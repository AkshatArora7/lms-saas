  # Transactional-outbox publisher (issue #344). A long-running WORKER, not a
  # gateway upstream: it drains event_outbox per-tenant (under FORCE RLS via
  # @lms/db.withTenant) and POSTs each event to the notification service's
  # `POST /events` for fan-out. It still runs a tiny Fastify server purely for a
  # `/health` liveness probe (+ a manual `/relay/run` trigger) on port 4026, so
  # the standard node-http healthcheck applies. depends_on notification (its
  # delivery target) + seed (so the demo tenant exists before the first drain).
  relay:
    # Local-build fallback (uncomment to build instead of pulling GHCR):
    # build:
    #   context: .
    #   dockerfile: services/relay/Dockerfile
    image: ghcr.io/akshatarora7/lms-saas/relay:latest
    environment:
      <<: *common-env
      PORT: 4026
      OTEL_SERVICE_NAME: relay
      NOTIFICATION_EVENTS_URL: http://notification:4012/events
      RELAY_POLL_INTERVAL_MS: ${RELAY_POLL_INTERVAL_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      notification:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck: *svc-healthcheck
    ports:
      - "4026:4026"
    restart: unless-stopped

  # Learner web app (Next.js standalone). Server-side *_URL env points at the
  # services it calls via compose DNS. Healthy = `/` returns < 500.
  web:
    # Local-build fallback (uncomment to build instead of pulling GHCR):
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/akshatarora7/lms-saas/web:latest
