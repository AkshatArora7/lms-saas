app = "lms-video-staging"
primary_region = "iad"

[build]

[http_service]
  internal_port = 4020
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "performance-2x"
  memory = "2gb"

[mounts]
  source = "video_scratch"
  destination = "/data/scratch"
